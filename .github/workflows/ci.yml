name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/shophub

jobs:
  # Step 1: Validate HTML/CSS
  validate:
    name: Validate HTML/CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate HTML files
        run: |
          echo "🔍 Validating HTML files..."
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "✓ Checking $file"
              # Basic HTML validation - check for required elements
              if grep -q "<!DOCTYPE" "$file" && grep -q "</html>" "$file"; then
                echo "✓ $file is valid HTML"
              else
                echo "✗ $file is missing required HTML structure"
                exit 1
              fi
            fi
          done

      - name: Validate CSS files
        run: |
          echo "🔍 Validating CSS files..."
          for file in *.css; do
            if [ -f "$file" ]; then
              echo "✓ Checking $file"
              # Basic CSS validation - check for common issues
              if ! grep -q "^[[:space:]]*$" "$file" || grep -q "{" "$file"; then
                echo "✓ $file appears to be valid CSS"
              fi
            fi
          done

      - name: Check for syntax errors
        run: |
          echo "🔍 Checking JavaScript syntax..."
          for file in *.js; do
            if [ -f "$file" ]; then
              echo "✓ Found $file"
            fi
          done

  # Step 2: Build Docker image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Build Docker image locally
        run: |
          echo "🐳 Building Docker image..."
          docker build -t shophub:${{ github.sha }} .
          echo "✓ Docker image built successfully"

      - name: Run container test
        run: |
          echo "🧪 Testing Docker container..."
          docker run --rm -d -p 8080:80 --name test-shophub shophub:${{ github.sha }}
          sleep 5
          
          # Test if container is running
          if docker ps | grep -q test-shophub; then
            echo "✓ Container is running"
          else
            echo "✗ Container failed to start"
            exit 1
          fi
          
          # Test if service is responding
          if docker exec test-shophub wget -q -O- http://localhost/ > /dev/null; then
            echo "✓ Service is responding"
          else
            echo "✗ Service is not responding"
            exit 1
          fi
          
          docker stop test-shophub

  # Step 3: Security Scan (Bonus)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image for scanning
        run: |
          docker build -t shophub:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shophub:scan
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Display vulnerability summary
        run: |
          echo "🔒 Security scan completed"
          echo "Check the Security tab for detailed results"

  # Status Check
  status-check:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [validate, build, security-scan]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.validate.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          else
            echo "✅ All checks passed"
          fi
