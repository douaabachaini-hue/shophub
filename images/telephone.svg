<svg xmlns="http://www.w3.org/2000/svg" width="582" height="582" viewBox="0 0 582 582">
  <defs>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Phone Body -->
  <rect x="120" y="50" width="342" height="482" rx="30" fill="url(#phoneGradient)" stroke="#000" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="140" y="80" width="302" height="380" rx="20" fill="url(#screenGradient)"/>
  
  <!-- Screen Content -->
  <text x="291" y="270" font-size="32" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ShopHub</text>
  <text x="291" y="310" font-size="16" fill="#ccc" text-anchor="middle" font-family="Arial, sans-serif">E-Commerce</text>
  
  <!-- Home Button -->
  <circle cx="291" cy="490" r="12" fill="none" stroke="#666" stroke-width="2"/>
  
  <!-- Camera Notch -->
  <ellipse cx="291" cy="75" rx="25" ry="15" fill="#000"/>
  <circle cx="291" cy="75" r="8" fill="#333" stroke="#222" stroke-width="1"/>
</svg>